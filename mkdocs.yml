# ============================================================
# PORTFOLIO CONFIGURATION
# This file is in the YAML format and is very sensitive to 
# spaces. Ensure to match the indentation level and spacing
# of new items with existing ones

# Edit all lines marked [YOUR ...] to customize your site
# ============================================================

site_name: "Retno Dammayatri - Geospatial Portfolio"
site_description: "Portfolio of Retno Dammayatri — GIS and Remote Sensing Analyst"
site_author: "Retno Dammayatri"
# After your site is live, uncomment and set this to your actual GitHub Pages URL:
site_url: "https://Dammayatri26.github.io/dammayatri-portfolio/

theme:
  name: material
  # Icon used as both the site logo (header) and browser favicon.
  # Browse icons at https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/
  # and replace "material/earth" with any "material/..." icon name you prefer.
  icon:
    logo: material/earth
  palette:
    # To change the color, edit the 'primary' and 'accent' values below for both
    # the 'default' (light) and 'slate' (dark) schemes.
    # Available colors: red, pink, purple, deep purple, indigo, blue, light blue,
    # cyan, teal, green, light green, lime, yellow, amber, orange, deep orange
    - scheme: default            # Light mode
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate              # Dark mode
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs            # Top-level nav items shown as horizontal tabs
    - navigation.top             # Back-to-top button when scrolling up
    - content.code.copy          # Copy button on all code blocks
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html        # Allows Markdown inside HTML blocks (used for project cards)
  - attr_list         # Allows adding CSS classes to elements: ![img](url){ .class }
  - admonition        # Note/warning/tip boxes
  - pymdownx.details  # Collapsible admonition blocks
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:   # Renders :material-icon: and :fontawesome-brands-icon: inline icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; Retno Dammayatri"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dammayatri26/
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/retnodammayatri/
    - icon: material/email
      link: mailto:dammayatri@gmail.com


plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - GIS and Spatial:
      - "Overview": projects/index-gis.md
      - "Restore Africa Project Monitoring Dashboard": projects/gis-dashboard.md
      - "Restore Africa Eligibility Mapping Assessment": projects/gis-eligibility.md
      - "Dental Clinic Expansion Analysis Using Spatial Analysis and Hexagon": projects/gis-jabodetabek.md
      - "Mapping Customer Pattern and Distribution": projects/gis-geocode.md
    - Remote Sensing:
      - "Overview": projects/index-rs.md
      - "Muara Gembong Mangrove Extent": projects/rs-muaragembong.md
      - "DSM & DTM Generation From Stereo Pair High-Resolution Satellite Imagery": projects/rs-dsm.md
      - "Jakarta Green Open Space Analysis": projects/rs-jkt.md
      - "Urban Built-Up Area Change Mapping Using Time-Series Sentinel Imagery": projects/rs-palembang.md
    - LiDAR Data Processing:
      - "Overview": projects/index-lidar.md
    - Photogrammetry/UAV Data Processing:
      - "Overview": projects/index-uav.md
    - Geospatial Intelligence:
      - "Overview": projects/index-gi.md
    # HOW TO ADD A NEW PROJECT:
    # 1. Copy docs/projects/sample-project.md to docs/projects/your-project-name.md
    #    (or drop an .ipynb file into docs/projects/ for a Jupyter notebook project)
    # 2. Edit the new file with your project content
    # 3. Add a line below (same format): - "Your Project Title": projects/your-project-name.md
    # 4. Add a project card on docs/projects/index.md
  
  - Experience: experience.md
  - Contact: contact.md
